name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}
      - name: Deploy
        run: |
          # nixos-rebuild can exit non-zero if a unit fails during activation
          # (e.g., stale preview instances). We capture the exit code and only
          # tolerate unit-activation failures — build/OOM/SSH errors must fail
          # the pipeline so they're not silently swallowed.
          set +e
          ssh -o StrictHostKeyChecking=accept-new root@159.89.98.26 \
            "nixos-rebuild switch --refresh --accept-flake-config --flake github:schemalabz/nix-openclaw#preview" 2>&1
          RC=$?
          set -e

          if [ $RC -eq 0 ]; then
            echo "Deploy succeeded"
          elif [ $RC -eq 1 ]; then
            # Exit code 1 from nixos-rebuild typically means a unit failed
            # during activation (e.g., stale preview). The Verify step will
            # confirm the core services are healthy.
            echo "::warning::nixos-rebuild exited with code 1 (possible unit activation failure). Verify step will check health."
          else
            echo "::error::nixos-rebuild failed with exit code $RC (build error, OOM, or SSH failure)"
            exit $RC
          fi
      - name: Verify
        run: |
          # Restart health service in case it's stale from long uptime
          ssh root@159.89.98.26 "systemctl restart health" || true

          # Retry health check — services may still be starting after switch
          for i in 1 2 3 4 5; do
            sleep 5
            HEALTH=$(curl -sf --max-time 10 http://159.89.98.26:9101/health) && break
            echo "Attempt $i: health endpoint not ready, retrying..."
            HEALTH=""
          done

          if [ -z "$HEALTH" ]; then
            echo "::error::Health endpoint unreachable after 5 attempts"
            exit 1
          fi

          echo "$HEALTH" | python3 -m json.tool

          DEPLOYED=$(echo "$HEALTH" | python3 -c "import json,sys; print(json.load(sys.stdin)['revision'])")
          if [ "$DEPLOYED" != "${{ github.sha }}" ]; then
            echo "::error::Expected revision ${{ github.sha }} but server reports $DEPLOYED"
            exit 1
          fi
